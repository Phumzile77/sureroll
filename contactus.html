<div style="display: flex; align-items: center; justify-content: space-between; padding: 20px 50px; border-bottom: 1px solid #ddd;">

    <!-- LOGO -->
    <div>
        <a href="index.html">
            <img src="img/Logo2.png" width="220" height="140">
        </a>
    </div>

    <!-- NAVIGATION -->
    <div style="font-size: 18px;">
        <a href="index.html" style="margin: 0 10px; text-decoration: none; color: black;">Home</a>

        <a href="contactus.html" style="margin: 0 10px; text-decoration: none; color: black;">Contact</a>
    </div>

</div>

<!-- PAGE TITLE -->
<div style="text-align: center; padding: 40px 20px;">
    <h1>Contact Us</h1>
</div>

<!-- FORMS SECTION -->
<div style="display: flex; justify-content: center; gap: 80px; flex-wrap: wrap; padding: 20px;">

    <!-- CONTACT FORM -->
    <div style="width: 350px;">
        <h2>Contact Us</h2>

        <form>

            <p>
                <label>Full Name:</label><br>
                <input type="text" style="width: 100%; padding: 10px;">
            </p>

            <p>
                <label>Email Address:</label><br>
                <input type="email" style="width: 100%; padding: 10px;">
            </p>

            <p>
                <label>Phone Number:</label><br>
                <input type="text" style="width: 100%; padding: 10px;">
            </p>

            <p>
                <label>Message:</label><br>
                <textarea rows="5" style="width: 100%; padding: 10px;"></textarea>
            </p>

            <p>
                <input type="submit" value="Send Message"
                       style="padding: 10px 20px; background: black; color: white; border: none;">
                <input type="reset" value="Clear"
                       style="padding: 10px 20px;">
            </p>

        </form>
    </div>

    <!-- REQUEST A QUOTE -->
    <div style="width: 350px;">
        <h2>Request a Quote</h2>

        <form>

            <p>
                <label>Company Name:</label><br>
                <input type="text" style="width: 100%; padding: 10px;">
            </p>

            <p>
                <label>Number of Employees:</label><br>
                <input type="number" style="width: 100%; padding: 10px;">
            </p>

            <p>
                <label>Services Needed:</label><br>
                <select style="width: 100%; padding: 10px;">
                    <option>Payroll</option>
                    <option>Accounting</option>
                    <option>HR Management</option>
                    <option>Full Package</option>
                </select>
            </p>

            <p>
                <label>Budget (Optional):</label><br>
                <input type="text" style="width: 100%; padding: 10px;">
            </p>

            <p>
                <label>Additional Notes:</label><br>
                <textarea rows="5" style="width: 100%; padding: 10px;"></textarea>
            </p>

            <p>
                <input type="submit" value="Submit Request"
                       style="padding: 10px 20px; background: black; color: white; border: none;">
            </p>

        </form>
    </div>

</div>
